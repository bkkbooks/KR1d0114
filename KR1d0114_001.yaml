body:
  text: 喪服變除圖天子之子封為諸侯天子皆不服也杜佑通典卷八十天子弔三公及三孤辨絰錫縗弔六卿辨絰錫縗弔大夫辨絰疑縗弔士辨絰緦縗弔畿內諸侯辨絰緦縗服通典卷八十一引無及三孤及六卿辨絰錫縗句士合大夫作弔大夫士皆辨絰疑縗據太平御覽卷五百六十一校正始聞喪去吉冠著素辨十五升布深衣從其君哭太廟阼階下祖絻即位成踊襲絰吉屨無絇張帷為次於其廳舍別內外蔬食飲水牡麻絰至成服服四升半繐布縗縷裳細而疏其冠八升纓帶中衣領袖緣亦如之七月而除受以朝服素冠踰月復吉通典卷八十一徐整問曰諸侯之大夫時會見於天子故為繐縗七月不知此大夫時以何事而得見也若遠國大夫在荒服者未嘗及見天子亦為服不答曰諸侯之大夫有出朝聘之事會見天子故言時會雖未會見猶服此服士已下則無服通典卷八十一徐整問為姑姊長殤在大功下殤在小功為姊已下絻五六歲未成童子為父母不杖不廬不菲至重猶尚不備今此何以越得為姊殤服備大功小功之制乎十七八尚可恐六七歲兒未能服此縗麻慈答曰六七歲雖未成童其姊死故宜著布深衣同上又卷內引庾蔚之説射慈以為未八歲服其近屬布深衣諸侯之女為天子后為天子之親服隨天王而降一等諸侯之女為后為其父母及兄弟為夫後者服𪗋縗其宗子亦不降徐整云諸侯女嫁為天子后為外親尊同則如邦人為君之長子三年也同上徐整問云經言為夫人君不道為其妻然則公卿諸侯之妻不為皇后服耶答云皇后天下之母則宜服周禮君命其夫后夫人亦宜命其婦其受命則不宜無服同上夫為妻去吉冠大夫以上素辨士素委貌衣十五升白布深衣吉屨無絇尸襲之時亦哭踊通典卷八十四為父既葬日中反哭諸侯於太祖廟別子為卿大夫亦於太祖廟其非別子為卿大夫於皇考廟中士下士於王考廟皆升自西階東西哭踊虞祭於殯宮通典卷八十七繼母為廬當就繼母之家若遠不得往者則別為異室亦有廬變除堊室及禫如親子也亦報子周不言報者凡經中之文悉報也通典卷八十九徐整問曰出妻之子為其母及父卒繼母嫁為之服報皆周也二母既出則為絶族今子為之服皆當於何處為位有廬堊室不出母亦當報其子不繼母報子於何處制服豈止所適者之家為哭位乎又當有禫不射慈答曰堂就出母之家若遠不得往者可別為異室亦有廬變除堊室及禫如親子也母亦報子周也同上徐整問曰婦人為君服周則諸侯夫人亦為天子服此也其聞喪之儀衣麻之數哭泣之位變除之節如周制將復有異耶射慈答曰其畿內諸侯夫人有助祭之禮則始喪之時悉當到京師復當還耳其畿外諸侯聞喪則當於路寢庭發喪夫人當堂上也變除之節皆如周服之制也通典卷九十徐整問射慈曰八歲以上為殤者服未滿八歲為無服假令子以元年正月生七歲十二月死此為七歲則無服也或以元年十二月生以八年正月死以但踐八年計其日月適六歲耳然號為八歲日月甚少全七歲者日月為多若人有二子各死如此其七歲者獨無服則父母之恩有偏頗答曰凡制數自以生月計之不以歲也問曰無服之殤以日易月哭之於何處有位無答曰哭之無位禮葬下殤於園中則無服之殤亦於園也其哭之就圍也通典卷九十一徐整問射慈云子思哭嫂為位在何面加麻袒絻為位不審服此有日數乎慈答曰凡喪位皆西面此麻者謂大殮及殯之時已畢而釋之通典卷九十二徐整問射慈曰古者三十而娶何緣當服得夫之姊殤服經文特為士作若説國君皆別言君若公答曰三十而娶禮之常制也古者七十而傳宗事與子年雖幼未滿三十自得少娶故曾子問曰宗子雖七十無無主婦此言宗子巳老傳宗事與子則宜有主婦同上諸侯之女為諸侯夫人服諸侯之親隨諸侯降一等還為族親則皆降之通典卷九十三傳曰尊同則得服其親服言尊同者謂俱為卿大夫各隨本親則不降也諸侯女為諸侯夫人不降父母昆弟之為父後者大夫妻唯父母昆弟為父後者宗子不降也同上間傳斬縗之喪既虞卒哭遭𪗋縗之喪輕者包重者特斬縗既葬縗裳六升男子絰帶悉易以葛婦人易首絰以葛腰帶故麻也但就五分去一分殺小之耳仍遭母及伯叔兄𪗋縗之喪其為母更以四升布為腰帶謂之包言以包斬縗帶也絰斬縗之葛絰謂之重者主於尊也婦人易首絰以麻亦謂之包帶斬縗之麻帶謂之特周喪既葬服上服六升之縗裳男子帶上服之葛帶婦人絰上服之葛絰也通典卷九十七引射慈服重者則易輕者也𪗋縗之喪既虞卒哭遭大功之喪麻葛兼服之𪗋縗既葬為母七升正服縗八升絰帶悉葛婦人首絰以葛腰帶故麻也亦猶五分去一殺小之耳又遭大功之喪更制大功之喪縗裳男子以麻為腰帶絰周之葛絰婦人易首絰以麻帶周之葛帶大功既葬亦服其功縗男子婦人悉反著周喪既葬之絰帶也同上服問三年之喪既練矣有期之喪既葬矣則帶其故葛帶絰期之絰服其功縗謂三年既練縗七升男子首絰婦人麻帶俱已徐矣又遭周喪更制周縗裳絰帶悉麻周喪既畢為母縗七升正服縗八升義服縗九升謂之功縗男子帶綀之葛絰周之麻謂既葬之麻也其大四寸百二十五分之七十六也同上既練遭大功喪麻葛重者既練男子有葛帶婦人有葛絰男子首絰婦人麻帶俱已除矣又遭大功之喪亦更制縗裳絰帶皆麻謂之重麻大功既葬還服練縗男子帶練之葛帶絰周之葛絰其婦人絰其練葛絰帶周之葛帶謂之重葛檀弓曰婦人不葛帶謂𪗋斬之婦人也今此帶周之葛帶者大功既葬婦人得葛帶不服大功之葛帶而帶周之葛帶者斬縗既練婦人除葛絰大功五寸二十五分之十九若帶大功之葛帶裁大三寸六百二十五分寸之四百二十九分絰帶五分去一之差也故帶周之葛帶周之葛帶大四寸百二十五分寸之七十六與練首絰差之宜也男子不絰大功葛絰而絰周之葛絰者亦以非練帶之差也同上服問曰殤長中變三年之葛終殤之月算而反三年之葛是非重麻為其無卒哭之稅下殤則不謂大功之親為殤在小功緦麻者皆易縗葛著麻絰帶以終殤之月數而反三年之葛謂若從父昆弟絰庶孫之長殤中殤在小功婦人為夫叔又長殤在小功中殤在緦麻者也此殤麻亦斷本變三年之葛者正親親也下殤不言賤也通典卷九十七引射慈檀弓有遠兄弟之喪雖緦必往非兄弟雖鄰不往雖緦必往親骨肉也雖鄰不往疏無親也同上士為姑姊妹女子子適人與主者𪗋縗周通典卷九十九引吳射慈三年周喪歲沒閏九月以下數閏也通典卷一百引射慈又王儉引鄭射王賀唯云閏則沒閏徐整問射慈曰改葬緦其奠如大斂從廟之廟從墓望墓禮宜同也又此大斂謂始死之大斂耶從廟悉謂何廟牲物何用慈答奠如大斂奠士大斂特豚從禰廟朝祖廟從故墓之新墓皆用特豚大夫以上其禮亡以此推之大夫奠用特豚天子太牢諸侯少牢通典卷一百二徐整問改葬虞答曰不在殯宮又不為位何虞之有同上徐整間射慈曰久喪不除小祥練可知爾有故未得葬遂至二十八月服制己過可得變不豈服十年五年至葬乃止乎答曰生雖不得變其餘旁親亦不除日月竟自釋之耳通典卷一百三禮記女子十五而笄射慈云十九猶為殤南史江謐傳檀弓曰麌而立尸有几筵卒哭而諱生事畢而鬼事始已下室之饋器物几杖如平生禮記檀弓正義
